<svg width="640" height="320" viewBox="0 0 640 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="50%" stop-color="#0f1119"/>
      <stop offset="100%" stop-color="#0a0b0f"/>
    </radialGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="emptySlotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background escuro -->
  <rect width="640" height="320" rx="12" fill="url(#bgGlow)"/>

  <!-- Grid de pontos sutis -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#00e5ff"/>
    </pattern>
    <rect width="640" height="320" fill="url(#dots)"/>
  </g>

  <!-- Camada de gradiente roxo/azul -->
  <rect width="640" height="320" rx="12" fill="url(#accentGradient)"/>

  <!-- Linha de brilho horizontal sutil (efeito scan) -->
  <rect x="0" y="160" width="640" height="1" fill="url(#glowLine)"/>

  <!-- Glow central atrás do slot -->
  <circle cx="320" cy="160" r="120" fill="url(#centerGlow)"/>

  <!-- Slot central para logo (96x96) -->
  <circle cx="320" cy="160" r="50" fill="url(#emptySlotGradient)" stroke="url(#borderGradient)" stroke-width="1.5"/>

  <!-- Ícone de "+" sutil no centro indicando "espaço para logo" -->
  <g opacity="0.15" filter="url(#glow)">
    <line x1="320" y1="140" x2="320" y2="180" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="300" y1="160" x2="340" y2="160" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Brilho sutil no canto superior direito -->
  <circle cx="540" cy="60" r="80" fill="#7c3aed" opacity="0.06" filter="blur(20px)"/>

  <!-- Brilho sutil no canto inferior esquerdo -->
  <circle cx="100" cy="260" r="60" fill="#00e5ff" opacity="0.05" filter="blur(15px)"/>
</svg>
